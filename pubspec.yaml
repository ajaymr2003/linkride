name: linkride
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # Networking & Maps
  http: ^1.2.0
  geolocator: ^11.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  connectivity_plus: ^5.0.0
  url_launcher: ^6.3.2

  # Firebase
  firebase_core: ^4.3.0
  firebase_database: ^12.1.1
  cloud_firestore: ^6.1.1
  firebase_auth: ^6.1.3
  google_sign_in: ^6.2.1
  cloud_functions: ^6.0.0

  # Storage & Utilities
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  form_field_validator: ^1.1.0
  permission_handler: ^12.0.1

  # Media & Camera
  image_picker: ^1.2.1
  image_cropper: ^8.0.2
  crop_image: ^1.0.17
  crop_your_image: ^1.1.0
  camera: ^0.11.2+1
  google_mlkit_face_detection: ^0.13.1

  # UI
  cupertino_icons: ^1.0.8
  firebase_messaging: ^16.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/